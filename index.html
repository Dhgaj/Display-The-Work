<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品发布中心 - 极简私有版本同步</title>

    <!-- 内联 SVG Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🚀</text></svg>"
    />

    <link rel="stylesheet" href="./index.css?v=1.0.1" />

    <!-- 引入 Marked.js 用于渲染 Markdown 文本 -->
    <script
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
      defer
    ></script>
  </head>
  <body>
    <div class="container">
      <header class="header" id="app-header">
        <div class="header-badge">PRIVATE RELEASES</div>
        <h1>版本发布中心</h1>
        <p>提供私有仓库手动发布的稳定版本及资产下载</p>
      </header>

      <!-- 动态渲染容器 -->
      <main class="releases-list" id="releases-container">
        <!-- 骨架屏占位 -->
        <div class="release-card skeleton-card"></div>
        <div class="release-card skeleton-card"></div>
      </main>

      <!-- 版权及使用条款声明 -->
      <div class="copyright-notice">
        <div class="notice-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <div class="notice-content">
          <strong>版权及授权声明：</strong>本站发布的所有版本及资产仅供个人学习与研究使用。<strong>未经授权，禁止将任何发布的版本用于商业用途。</strong>
        </div>
      </div>

      <footer class="footer">
        <p>© 2026 Display-The-Work.</p>
        <p style="margin-top: 8px; font-size: 0.8rem">
          构建状态：<span style="color: #10b981">● 正常运行</span> |
          <a
            href="https://github.com/Dhgaj"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub 账户</a
          >
        </p>
      </footer>
    </div>

    <script src="./index.js" defer></script>
  </body>
</html>
